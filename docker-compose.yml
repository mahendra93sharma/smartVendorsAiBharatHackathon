version: '3.8'

services:
  # DynamoDB Local for development
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: smart-vendors-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    volumes:
      - dynamodb-data:/home/dynamodblocal/data
    networks:
      - smart-vendors-network

  # LocalStack for AWS services emulation
  localstack:
    image: localstack/localstack:latest
    container_name: smart-vendors-localstack
    ports:
      - "4566:4566"  # LocalStack gateway
      - "4571:4571"  # S3
    environment:
      - SERVICES=s3,lambda,sns,transcribe,sagemaker
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - LAMBDA_EXECUTOR=docker
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - localstack-data:/tmp/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - smart-vendors-network

  # Backend API (for local testing)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-vendors-backend
    ports:
      - "8080:8080"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - S3_ENDPOINT=http://localstack:4566
      - DEMO_MODE=true
      - LOG_LEVEL=DEBUG
    depends_on:
      - dynamodb-local
      - localstack
    networks:
      - smart-vendors-network
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8080 --reload

  # Frontend (for local testing)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-vendors-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - smart-vendors-network

  # DynamoDB Admin UI (optional)
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: smart-vendors-dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    depends_on:
      - dynamodb-local
    networks:
      - smart-vendors-network

networks:
  smart-vendors-network:
    driver: bridge

volumes:
  dynamodb-data:
  localstack-data:
