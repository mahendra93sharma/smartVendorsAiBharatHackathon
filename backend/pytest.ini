[pytest]
# Pytest configuration for Smart Vendors backend tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers
markers =
    property: Property-based tests using Hypothesis
    unit: Unit tests
    integration: Integration tests
    slow: Slow-running tests

# Hypothesis settings
hypothesis_profile = default
